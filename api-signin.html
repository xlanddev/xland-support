<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XLAND API - Sign In</title>

<link rel="stylesheet" href="api-account.css">

</head>

<body>

<div class="background"></div>

<div class="login-card">

    <h1>🌍 XLAND API</h1>

    <p class="subtitle">
        Welcome Back
    </p>

    <div class="input-group">

        <label>👤 Username</label>

        <input
        type="text"
        id="username"
        placeholder="Enter Username">

    </div>

    <div class="input-group">

        <label>🔒 Password</label>

        <input
        type="password"
        id="password"
        placeholder="Enter Password">

    </div>

    <button id="signinBtn" class="main-btn">

        Sign In

    </button>

    <p class="bottom-text">

        Don't have an account?

    </p>

    <a href="api-signup.html" class="link-btn">

        Create Account

    </a>

</div>

<script src="security.js"></script>

<script src="api-account.js"></script>

</body>

</html>
