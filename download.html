<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Download Script</title>

<link rel="stylesheet" href="download.css">

<link rel="icon" type="image/png" href="xland-icon.png">

</head>

<body>

<div class="background"></div>

<div class="card">

    <h1>⬇ Download Script</h1>

    <h2 id="scriptName">Calculator.py</h2>

    <p>Ready to download this script.</p>

    <div class="info">

        <div class="item">
            <span>Language</span>
            <strong>Python</strong>
        </div>

        <div class="item">
            <span>Version</span>
            <strong>1.0</strong>
        </div>

        <div class="item">
            <span>Size</span>
            <strong>2.3 KB</strong>
        </div>

    </div>

    <div class="buttons">

        <button class="cancel"
        onclick="history.back()">

            Cancel

        </button>

        <button class="download"
        onclick="downloadScript()">

            Download

        </button>

    </div>

</div>

<script src="download.js"></script>

</body>
</html>
