<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>XLAND API - Create Account</title>

    <link rel="stylesheet" href="api-account.css">

</head>

<body>

<div class="background"></div>

<div class="login-card">

    <h1>🌍 XLAND API</h1>

    <p class="subtitle">
        Create Your Account
    </p>

    <div class="input-group">

        <label>📧 Email</label>

        <input
            type="email"
            id="email"
            placeholder="Enter your email">

    </div>

    <div class="input-group">

        <label>👤 Username</label>

        <input
            type="text"
            id="username"
            placeholder="Choose a username">

    </div>

    <div class="input-group">

        <label>🔒 Password</label>

        <input
            type="password"
            id="password"
            placeholder="Create a password">

    </div>

    <div class="input-group">

        <label>🔐 Confirm Password</label>

        <input
            type="password"
            id="confirmPassword"
            placeholder="Repeat your password">

    </div>

    <button id="createAccountBtn" class="main-btn">

        Create Account

    </button>

    <p class="bottom-text">

        Already have an account?

    </p>

    <a href="api-signin.html" class="link-btn">

        Sign In

    </a>

</div>

<script src="security.js"></script>

<script src="api-account.js"></script>

</body>

</html>
