<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account | Xland Script</title>

    <link rel="stylesheet" href="signup.css">

    <link rel="icon" href="xland-icon.png">


</head>

<body>

<div class="glass">

    <h1>Create Account</h1>

    <input
        type="email"
        id="email"
        placeholder="Email">

    <input
        type="text"
        id="username"
        placeholder="Username">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm Password">

    <button id="createAccountBtn">

        Create Account

    </button>

    <p>

        Already have an account?

    </p>

    <button id="backBtn">

        Back to Sign In

    </button>

</div>

<script src="signup.js"></script>

</body>

</html>
