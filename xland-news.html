<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XLAND News</title>

<link rel="icon" href="xland-icon.png">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="loader.css">
<link rel="stylesheet" href="xland-news.css">

</head>

<body>

<div id="loader">

    <img src="loading.gif" alt="Loading">

</div>

<div id="newsContainer" class="news-container">

</div>

<header class="news-header">

    <h1>📰 XLAND News</h1>

    <p>Latest news and updates from XLAND</p>

</header>

<div class="news-container">

    <!-- News Card -->

    <div class="news-card">

        <img src="images/update31.png" alt="XLAND Update">

        <div class="news-content">

            <span class="news-tag">
                🟢 NEW
            </span>

            <h2>
                🚀 XLAND Support 3.1 Released
            </h2>

            <p class="date">

                📅 July 2026

            </p>

            <p>

                The new API Platform, Documentation, Loader,
                API Keys and Account System have been added.

            </p>

            <button>

                Read More

            </button>

        </div>

    </div>

</div>

<script src="loader.js"></script>
<script src="xland-news.js"></script>

</body>

</html>
